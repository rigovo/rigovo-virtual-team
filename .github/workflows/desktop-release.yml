name: Desktop Release

on:
  push:
    tags: ["desktop-v*"]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. desktop-v1.0.0-beta.1). Leave empty for artifact-only build."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          # Use glob so cache setup doesn't fail when path resolution differs across runners.
          cache-dependency-path: "**/package-lock.json"

      - name: Install dependencies
        working-directory: apps/desktop
        shell: bash
        run: |
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install
          fi

      - name: Build Electron app (main + preload + renderer)
        working-directory: apps/desktop
        run: npx electron-vite build

      # Build platform installers locally; GitHub release upload is handled
      # by the dedicated `release` job below.
      - name: Package installers for ${{ matrix.platform }}
        working-directory: apps/desktop
        run: npx electron-builder --publish never
        env:
          # macOS code signing (optional — set these secrets if you have a certificate)
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # Windows code signing (optional)
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: List release artifacts
        working-directory: apps/desktop/release
        shell: bash
        run: ls -lhR . || true

      - name: Upload macOS artifacts
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: rigovo-desktop-mac
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/latest-mac.yml
          if-no-files-found: warn

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: rigovo-desktop-linux
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/latest-linux.yml
          if-no-files-found: warn

      - name: Upload Windows artifacts
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: rigovo-desktop-win
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/latest.yml
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only create a release for tag pushes or when a tag_name is explicitly provided
    if: startsWith(github.ref, 'refs/tags/desktop-v') || github.event.inputs.tag_name != ''

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: find artifacts -type f | sort

      - name: Determine tag
        id: tag
        run: |
          if [[ -n "${{ github.event.inputs.tag_name }}" ]]; then
            echo "name=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine if prerelease
        id: pre
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          if [[ "$TAG" == *"beta"* ]] || [[ "$TAG" == *"alpha"* ]] || [[ "$TAG" == *"rc"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "Rigovo Desktop ${{ steps.tag.outputs.name }}"
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.pre.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
