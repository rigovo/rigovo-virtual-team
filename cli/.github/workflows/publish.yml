name: Release & Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run full test suite
        run: pytest --tb=short -q

  rigour:
    name: Rigour Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Rigour gates
        run: npx -y @rigour-labs/cli check --ci

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: [test, rigour]
    concurrency: release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip build
          pip install python-semantic-release

      - name: Semantic Release — Version + Tag + Changelog
        id: semrel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          semantic-release version
          echo "released=$(git tag --points-at HEAD | head -1)" >> $GITHUB_OUTPUT

      - name: Build package
        if: steps.semrel.outputs.released != ''
        run: python -m build

      - name: Publish to TestPyPI
        if: steps.semrel.outputs.released != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: steps.semrel.outputs.released != ''
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        if: steps.semrel.outputs.released != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(git tag --points-at HEAD | head -1)
          semantic-release changelog --released
          gh release create "$TAG" dist/* \
            --title "$TAG" \
            --notes-file CHANGELOG.md \
            --latest
