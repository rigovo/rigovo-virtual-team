<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark navy background with rounded corners -->
  <rect width="1024" height="1024" rx="228" fill="#0D1117"/>

  <!-- Outer ring -->
  <circle cx="512" cy="512" r="320" stroke="#3B82F6" stroke-width="24" opacity="0.7"/>

  <!-- Inner filled circle (blue gradient) -->
  <circle cx="512" cy="512" r="192" fill="url(#rg-grad)"/>

  <!-- Center checkmark circle -->
  <circle cx="512" cy="512" r="112" fill="#1D4ED8"/>

  <!-- Checkmark -->
  <path
    d="M440 520l48 48 96-96"
    stroke="#FFFFFF"
    stroke-width="32"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Crosshair notches — top -->
  <line x1="512" y1="128" x2="512" y2="192" stroke="#3B82F6" stroke-width="24" stroke-linecap="round"/>
  <!-- bottom -->
  <line x1="512" y1="832" x2="512" y2="896" stroke="#3B82F6" stroke-width="24" stroke-linecap="round"/>
  <!-- left -->
  <line x1="128" y1="512" x2="192" y2="512" stroke="#3B82F6" stroke-width="24" stroke-linecap="round"/>
  <!-- right -->
  <line x1="832" y1="512" x2="896" y2="512" stroke="#3B82F6" stroke-width="24" stroke-linecap="round"/>

  <!-- Gap lines to ring — inner crosshair guides -->
  <line x1="512" y1="224" x2="512" y2="288" stroke="#3B82F6" stroke-width="16" stroke-linecap="round" opacity="0.5"/>
  <line x1="512" y1="736" x2="512" y2="800" stroke="#3B82F6" stroke-width="16" stroke-linecap="round" opacity="0.5"/>
  <line x1="224" y1="512" x2="288" y2="512" stroke="#3B82F6" stroke-width="16" stroke-linecap="round" opacity="0.5"/>
  <line x1="736" y1="512" x2="800" y2="512" stroke="#3B82F6" stroke-width="16" stroke-linecap="round" opacity="0.5"/>

  <defs>
    <radialGradient id="rg-grad" cx="50%" cy="38%" r="60%" fx="50%" fy="38%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </radialGradient>
  </defs>
</svg>
